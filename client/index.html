<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
    />
    <title>Multiplayer Platformer</title>
</head>
<body>
<main id="start-screen">
    <form id="nickname-form">
        <h1>Multiplayer Platformer</h1>

        <label for="nickname">
            Nickname
        </label>

        <input
                id="nickname"
                name="nickname"
                type="text"
                minlength="1"
                maxlength="20"
                placeholder="Enter your nickname"
                autocomplete="nickname"
                required
        />

        <button type="submit">
            Play
        </button>
    </form>
</main>

<div id="game-container"></div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
